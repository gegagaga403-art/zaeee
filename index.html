<!DOCTYPE html>
<html>
<head>
    <title>WARNING!</title>

    <style>
	body {
	    background-color: #f0f8ff; /* Mengubah warna latar belakang jadi biru muda */
	    font-family: 'Segoe UI', sans-serif; /* Mengubah model tulisan agar rapi */
	    text-align: center; /* membuat semua tulisan berada di tengah layar */
	    padding: 50px;
	}

	/* Gaya untuk kotak peringatan */
	.kotak-peringatan {
	   background-color: #fff3cd;
	   border: 2px dashed #ffc107;
	   color: #856404;
	   padding: 15px;
 	   border-radius: 8px;
	   max-width: 560px;
	   margin: 0 auto 20px auto;
	   text-align: left;
	}

	.kotak-peringatan p {
	    font-size: 15px;
	    margin: 5px 0;
	    color: #856404;
	}

	button {
	    background-color: #e74c3c; /* mengubah warna tombol jadi merah */
	    color: white; /* mengubah warna tulisan di dalam tombol jadi putih */
	    border: none; /* menghilangkan garis pinggir tombol yang kaku */
	    padding: 12px 24px; /* membuat tombol jadi lebih gemuk/besar */
	    font-size: 16px;
	    border-radius: 8px; /* membuat sudut tombol jadi melengkung (aesthetic) */
	    cursor: pointer; /* membuat kursor mouse berubah jadi jari tangan saat menunjuk tombol */
	    margin-bottom: 20px;
	}

	/* Efek interaktif: saat tombol ditunjuk mouse, warnanya berubah */
	button:hover {
	    background-color: #c0392b; /* merah yang agak tua */
	}
    </style>

</head>
<body>

	<h1>halo bung</h1>
	<p>gw baru belajar coding nih</p>

	<div class="kotak-peringatan">
	     <p><strong>⚠️ PERINGATAN SISTEM:</strong> Konten di dalam tombol ini sangat rahasia dan sangat berbahaya.</p>
	     <p><strong>💡TIPS:</strong> pastikan hp anda dalam kondisi yang aman dari bahaya.</p>
	</div>

	<button onclick="pencetTombol()">sini</button>

	<br>

	<img id="fotoPrank" src="gipaway.jpeg" alt="Foto Kejutan" style="display:none; width: 280px; margin-top: 20px; 	border-radius: 12px; box-shadow: 0px 4px 8px rgba(0,0,0,0.2);">
	
	<!-- Teks ketawa yang akan muncul bareng foto -->
	<h1 id="teksKetawa" style="display:none; color: red; font-size: 40px; margin-top: 20px;">FOR YOU BUNNG😹</h1>

	<script>
	    function pencetTombol() {
		// Sekarang murni hanya memunculkan teks ketawa dan fotomu saja tanpa suara
		document.getElementById("teksKetawa").style.display = "block";
		document.getElementById("fotoPrank").style.display = "block"; 
	    }
    </script>
</body>
</html>
